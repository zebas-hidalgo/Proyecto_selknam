<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Borde negro grueso estándar de reconocimiento para RA -->
  <rect x="10" y="10" width="180" height="180" fill="#ffffff" stroke="#000000" stroke-width="20"/>
  
  <!-- Patrón simbólico Selk'nam en el centro -->
  <circle cx="100" cy="100" r="40" fill="#a83232" stroke="#000000" stroke-width="4"/>
  <line x1="100" y1="60" x2="100" y2="140" stroke="#ffffff" stroke-width="6"/>
  <line x1="80" y1="100" x2="120" y2="100" stroke="#ffffff" stroke-width="6"/>
  
  <!-- Detalles decorativos -->
  <circle cx="70" cy="70" r="6" fill="#000000"/>
  <circle cx="130" cy="70" r="6" fill="#000000"/>
  <circle cx="70" cy="130" r="6" fill="#000000"/>
  <circle cx="130" cy="130" r="6" fill="#000000"/>
</svg>
