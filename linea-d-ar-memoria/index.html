<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memoria Viva - Realidad Aumentada Selk'nam</title>
  
  <!-- CDNs estables y compatibles obligatorios: A-Frame 1.3.0 + MindAR 1.2.2 -->
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
  
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>
<body>

  <!-- 1. PANTALLA DE INICIO (Activación requerida para solicitar cámara bajo HTTPS) -->
  <div id="welcome-screen">
    <div class="welcome-card">
      <h1>Memoria Viva</h1>
      <p class="subtitle">
        Experiencia de Realidad Aumentada. Apunta tu camara al marcador impreso del archivo Gusinde para revelar fotografias restauradas, cantos y relatos patrimoniales.
      </p>
      <button class="start-btn" onclick="iniciarRA()">Iniciar Cámara</button>
    </div>
  </div>

  <!-- 2. UI SUPERPUESTA EN 2D -->
  <div id="ar-overlay" class="hidden">
    <div class="info-card">
      <h3 id="target-title">Buscando Marcador...</h3>
      <p id="target-desc">Por favor, enfoca la cámara sobre el marcador imprimible ('marcador_imprimir.svg').</p>
    </div>
    <!-- Botón flotante para restablecer la cámara -->
    <button id="capture-btn" class="hidden">Capturar Pantalla</button>
  </div>

  <!-- 3. ESCENA DE REALIDAD AUMENTADA (A-FRAME + MINDAR) -->
  <!-- Referencia a un archivo .mind genérico público para pruebas instantáneas (ejemplo de MindAR oficial) -->
  <a-scene mindar-image="imageTargetSrc: https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/examples/image-tracking/assets/card-example/card.mind; autoStart: false;" 
           color-space="sRGB" 
           renderer="colorManagement: true, physicallyCorrectLights: true" 
           vr-mode-ui="enabled: false" 
           device-orientation-permission-ui="enabled: false">
    
    <!-- Cargador de Recursos Multimedia -->
    <a-assets>
      <!-- Imagen restaurada de prueba que se proyectará sobre el marcador físico -->
      <img id="foto-restaurada" src="https://upload.wikimedia.org/wikipedia/commons/e/ec/Selk%27nam_people_1923.jpg" crossorigin="anonymous">
      <!-- Canto ceremonial de prueba -->
      <audio id="canto-selknam" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-84.wav" preload="auto" crossorigin="anonymous"></audio>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!-- OBJETIVO DE DETECCIÓN DE IMAGEN (targetIndex: 0) -->
    <a-entity mindar-image-target="targetIndex: 0" id="ar-target">
      
      <!-- Proyección del plano de la fotografía sobre el papel físico -->
      <a-plane src="#foto-restaurada" position="0 0 0" height="1" width="1.4" rotation="0 0 0" shadow="receive: true"></a-plane>
      
      <!-- Marco decorativo en color rojo arcilla -->
      <a-ring color="#a83232" radius-inner="0.75" radius-outer="0.8" rotation="0 0 0" position="0 0 0.01"></a-ring>
      
      <!-- Panel de texto 3D flotante justo encima -->
      <a-plane color="#160f0f" height="0.3" width="1.4" position="0 0.7 0.05" opacity="0.9">
        <a-text value="Archivo Gusinde - 1923" color="#ffffff" align="center" width="2.5" position="0 0 0.01"></a-text>
      </a-plane>
      
    </a-entity>

  </a-scene>

</body>
</html>
